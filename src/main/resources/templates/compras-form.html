<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Compra - Tienda Gestión</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Mi Tienda</div>
        <div class="navbar-menu">
            <a th:href="@{/dashboard}">🏠 Dashboard</a>
            <a th:href="@{/productos}">📦 Productos</a>
            <a th:href="@{/ventas}">💰 Ventas</a>
            <a th:href="@{/compras}" class="active">🛒 Compras</a>
            <a th:href="@{/alertas}">🔔 Alertas</a>
            <a th:href="@{/reportes}">📊 Reportes</a>
            <a th:href="@{/logout}">🚪 Salir</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h1>Nueva Compra</h1>
        </div>
        
        <form th:action="@{/compras/guardar}" th:object="${compra}" method="post" class="form">
            <div class="form-group">
                <label for="producto">Producto</label>
                <select id="producto" name="productoId" required onchange="cargarProducto()">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="prod : ${productos}" 
                            th:value="${prod.id}" 
                            th:data-precio="${prod.precioCompra}"
                            th:data-stock="${prod.stock}"
                            th:text="${prod.nombre + ' (Stock: ' + prod.stock + ')'}">
                    </option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="cantidad">Cantidad a Comprar</label>
                <input type="number" id="cantidad" name="cantidad" min="1" value="1" required oninput="calcularTotal()">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="proveedor">Proveedor</label>
                    <input type="text" id="proveedor" th:field="*{proveedor}" required>
                </div>
                
                <div class="form-group">
                    <label for="numeroFactura">N° de Factura</label>
                    <input type="text" id="numeroFactura" th:field="*{numeroFactura}" readonly>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="precioUnitario">Precio Unitario (S/)</label>
                    <input type="number" step="0.01" id="precioUnitario" name="precioUnitario" value="0" required oninput="calcularTotal()">
                </div>
                
                <div class="form-group">
                    <label for="total">Total (S/)</label>
                    <input type="number" step="0.01" id="total" th:field="*{total}" readonly style="font-weight: bold; font-size: 1.2em;">
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Guardar Compra</button>
                <a th:href="@{/compras}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
    
    <script>
    document.getElementById('numeroFactura').value = 'FAC-' + new Date().getTime();
    
    function cargarProducto() {
        const select = document.getElementById('producto');
        const opciones = select.options[select.selectedIndex];
        const precioInput = document.getElementById('precioUnitario');
        
        if (opciones.value && opciones.dataset.precio) {
            precioInput.value = opciones.dataset.precio;
        } else {
            precioInput.value = 0;
        }
        calcularTotal();
    }
    
    function calcularTotal() {
        const cantidad = parseFloat(document.getElementById('cantidad').value) || 0;
        const precio = parseFloat(document.getElementById('precioUnitario').value) || 0;
        const total = cantidad * precio;
        document.getElementById('total').value = total.toFixed(2);
    }
    </script>
</body>
</html>
