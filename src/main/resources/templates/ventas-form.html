<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Venta - Tienda Gestión</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Tienda Gestión</div>
        <div class="navbar-menu">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/productos}">Productos</a>
            <a th:href="@{/ventas}" class="active">Ventas</a>
            <a th:href="@{/compras}">Compras</a>
            <a th:href="@{/alertas}">Alertas</a>
            <a th:href="@{/logout}">Cerrar Sesión</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h1>Nueva Venta</h1>
        </div>
        
        <div id="message-container"></div>
        
        <form id="venta-form">
            <div class="form-group">
                <label for="producto">Seleccionar Producto</label>
                <select id="producto" onchange="actualizarPrecio()">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="prod : ${productos}" 
                            th:value="${prod.id}" 
                            th:text="${prod.nombre + ' - Stock: ' + prod.stock + ' - Precio: S/ ' + prod.precioVenta}"
                            th:data-precio="${prod.precioVenta}"
                            th:data-stock="${prod.stock}">
                    </option>
                </select>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="cantidad">Cantidad</label>
                    <input type="number" id="cantidad" min="1" value="1" onchange="calcularTotal()">
                </div>
                
                <div class="form-group">
                    <label for="precio">Precio Unitario (S/)</label>
                    <input type="number" step="0.01" id="precio" readonly>
                </div>
            </div>
            
            <div class="form-group">
                <label for="total">Total (S/)</label>
                <input type="number" step="0.01" id="total" readonly value="0">
            </div>
            
            <button type="button" onclick="agregarProducto()" class="btn btn-secondary">➕ Agregar Producto</button>
        </form>
        
        <h3>Productos en la Venta</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Subtotal</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-productos">
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="3" style="text-align: right;"><strong>Total:</strong></td>
                    <td id="total-venta"><strong>S/ 0.00</strong></td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
        
        <div class="form-actions">
            <button type="button" onclick="registrarVenta()" class="btn btn-primary">💵 Registrar Venta</button>
            <a th:href="@{/ventas}" class="btn btn-secondary">Cancelar</a>
        </div>
    </div>
    
    <script th:src="@{/js/ventas.js}"></script>
</body>
</html>
