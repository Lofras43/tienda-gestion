<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.id != null ? 'Editar Producto' : 'Nuevo Producto'}">Producto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Mi Tienda</div>
        <div class="navbar-menu">
            <a th:href="@{/dashboard}">🏠 Dashboard</a>
            <a th:href="@{/productos}" class="active">📦 Productos</a>
            <a th:href="@{/ventas}">💰 Ventas</a>
            <a th:href="@{/compras}">🛒 Compras</a>
            <a th:href="@{/alertas}">🔔 Alertas</a>
            <a th:href="@{/reportes}">📊 Reportes</a>
            <a th:href="@{/logout}">🚪 Salir</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h1 th:text="${producto.id != null ? 'Editar Producto' : 'Nuevo Producto'}"></h1>
        </div>
        
        <form th:action="@{/productos/guardar}" th:object="${producto}" method="post" class="form">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{estaActivo}">
            
            <div class="form-group">
                <label for="nombre">Nombre del Producto</label>
                <input type="text" id="nombre" th:field="*{nombre}" required>
            </div>
            
            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" th:field="*{descripcion}" rows="3"></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="precioVenta">Precio de Venta (S/)</label>
                    <input type="number" step="0.01" id="precioVenta" th:field="*{precioVenta}" required>
                </div>
                
                <div class="form-group">
                    <label for="precioCompra">Precio de Compra (S/)</label>
                    <input type="number" step="0.01" id="precioCompra" th:field="*{precioCompra}" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="stock">Stock Inicial</label>
                    <input type="number" id="stock" th:field="*{stock}" required>
                </div>
                
                <div class="form-group">
                    <label for="stockMinimo">Stock Mínimo</label>
                    <input type="number" id="stockMinimo" th:field="*{stockMinimo}" value="10">
                </div>
            </div>
            
            <div class="form-group">
                <label for="fechaVencimiento">Fecha de Vencimiento</label>
                <input type="date" id="fechaVencimiento" th:field="*{fechaVencimiento}">
            </div>
            
            <div class="form-group">
                <label for="categoria">Categoría</label>
                <select id="categoria" th:field="*{categoria}">
                    <option value="">Seleccionar categoría</option>
                    <option value="Abarrotes">Abarrotes</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="Lácteos">Lácteos</option>
                    <option value="Panadería">Panadería</option>
                    <option value="Confitería">Confitería</option>
                    <option value="Limpieza">Limpieza</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
